services:
  platform-listing-tool:
    build: .
    restart: unless-stopped
    ports:
      - "8082:8080"          # change host port if 8082 is taken
    environment:
      - PORT=8080
    # R2 credentials (account id, access key, secret, endpoint, bucket, public base).
    # On the prod LXC this lives at /opt/platform-listing-tool/r2.env
    env_file:
      - ./r2.env
